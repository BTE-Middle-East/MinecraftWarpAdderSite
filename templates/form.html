<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Middle East Warps</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        form {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            width: 300px;
            margin-top: 20px;
            display: inline-block;
            text-align: left;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        label, input {
            display: block;
            width: 100%;
            margin-bottom: 10px;
        }
        input[type="text"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #333333;
            background-color: #333333;
            color: #ffffff;
            box-sizing: border-box;
        }
        input[type="submit"] {
            padding: 10px;
            border-radius: 4px;
            border: none;
            background-color: #ff5722;
            color: #ffffff;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        input[type="submit"]:hover {
            background-color: #e64a19;
        }
        .file-list {
            margin-top: 20px;
            text-align: left;
        }
        .file-list a {
            color: #ff5722;
            text-decoration: none;
        }
        .file-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img style="max-width: 45%;" src="{{ url_for('static', filename='bteme.png') }}" alt="bte me logo"> <br>
        <form action="/submit" method="post">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        
            <label for="coordinates">Coordinates (x, y, z):</label>
            <input type="text" id="coordinates" name="coordinates" required>
        
            <input type="submit" value="Submit">
        </form>
        <div class="file-list">
            <h2>Submitted Files:</h2>
            <ul>
                {% for file in files %}
                <li><a href="{{ url_for('serve_file', filename=file) }}">{{ file }}</a></li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
